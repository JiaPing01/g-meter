<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Force 教練</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --primary: #00ffcc;
            --comfort: #4caf50;
            --warn: #ff9800;
            --danger: #f44336;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: none;
        }
        h1 { margin: 5px 0 15px 0; font-size: 22px; color: var(--primary); text-align: center; width: 100%; }
        
        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 450px;
            align-items: center;
        }

        /* 橫向模式 UI 自動分左右 */
        @media (orientation: landscape) {
            .main-container {
                flex-direction: row;
                max-width: 900px;
                justify-content: space-around;
                align-items: flex-start;
            }
            .left-panel, .right-panel { width: 48%; }
            .canvas-container { margin-top: 20px; }
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            justify-content: center;
        }
        button {
            background: #333;
            color: white;
            border: 2px solid #555;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            flex: 1;
            cursor: pointer;
        }
        button.active { border-color: var(--primary); background: #222; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 10px;
        }
        .card {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .card-title { font-size: 12px; color: #888; margin-bottom: 5px; }
        .card-value { font-size: 26px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .score-val { color: var(--primary); }
        
        .canvas-container {
            position: relative;
            width: 260px;
            height: 260px;
            background: #111;
            border-radius: 50%;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 0 auto 10px auto;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #g-meter-bg { z-index: 1; }
        #g-meter { z-index: 2; }
        
        .settings {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 15px;
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }
        
        .sliders {
            width: 100%;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .slider-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-group label {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] { width: 100%; accent-color: var(--primary); }
    </style>
</head>
<body>

    <h1>司機 G 力監控</h1>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="controls">
                <button id="btn-toggle">啟動/授權</button>
                <button id="btn-cal">基準校正</button>
            </div>

            <div class="dashboard">
                <div class="card">
                    <div class="card-title">合成 G (Total)</div>
                    <div class="card-value" id="val-total">0.00</div>
                </div>
                <div class="card">
                    <div class="card-title">舒適度評分</div>
                    <div class="card-value score-val" id="val-score">100</div>
                </div>
                <div class="card">
                    <div class="card-title">橫向 G (Lat)</div>
                    <div class="card-value" id="val-lat">0.00</div>
                </div>
                <div class="card">
                    <div class="card-title">縱向 G (Lon)</div>
                    <div class="card-value" id="val-lon">0.00</div>
                </div>
            </div>

            <div class="settings">
                <span>最大橫向: <span id="stat-lat">0.00</span></span>
                <span>最大煞車: <span id="stat-lon">0.00</span></span>
                <span>超標: <span id="stat-viol">0</span> 次</span>
            </div>
            
            <div class="sliders">
                <div class="slider-group">
                    <label><span>警告閾值 (超過扣分/橘燈):</span> <span id="label-warn">0.20 G</span></label>
                    <input type="range" id="input-warn" min="0.10" max="0.50" step="0.01" value="0.20">
                </div>
                <div class="slider-group">
                    <label><span>危險閾值 (重扣分/紅燈):</span> <span id="label-danger">0.35 G</span></label>
                    <input type="range" id="input-danger" min="0.20" max="0.80" step="0.01" value="0.35">
                </div>
                <div class="slider-group">
                    <label><span>死區 (忽略微震不計分):</span> <span id="label-deadzone">0.08 G</span></label>
                    <input type="range" id="input-deadzone" min="0" max="0.20" step="0.01" value="0.08">
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="canvas-container">
                <canvas id="g-meter-bg" width="300" height="300"></canvas>
                <canvas id="g-meter" width="300" height="300"></canvas>
            </div>
        </div>
    </div>

<script>
    // 變數化閾值
    let T_WARN = 0.20;
    let T_DANGER = 0.35;
    let DEADZONE = 0.08;
    let JERK_LIMIT = 0.35; // 隱藏在背景，避免太多滑桿太亂
    const SCALE = 300; 

    // 滑桿連動事件
    document.getElementById('input-warn').addEventListener('input', (e) => {
        T_WARN = parseFloat(e.target.value);
        document.getElementById('label-warn').innerText = T_WARN.toFixed(2) + ' G';
        if(T_WARN >= T_DANGER) {
            T_DANGER = T_WARN + 0.05;
            document.getElementById('input-danger').value = T_DANGER;
            document.getElementById('label-danger').innerText = T_DANGER.toFixed(2) + ' G';
        }
    });
    document.getElementById('input-danger').addEventListener('input', (e) => {
        T_DANGER = parseFloat(e.target.value);
        document.getElementById('label-danger').innerText = T_DANGER.toFixed(2) + ' G';
    });
    document.getElementById('input-deadzone').addEventListener('input', (e) => {
        DEADZONE = parseFloat(e.target.value);
        document.getElementById('label-deadzone').innerText = DEADZONE.toFixed(2) + ' G';
    });

    let isRunning = false;
    let baseline = { x: 0, y: 0, z: 0 };
    let currentG = { x: 0, y: 0 }; 
    let lastTotalG = 0;
    let lastTime = 0;
    let stats = { maxLat: 0, maxBrake: 0, violations: 0, score: 100 };
    let historyPath = [];

    // 螢幕喚醒鎖 Wake Lock API
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) { console.error('Wake Lock 失敗:', err); }
    }
    // 網頁切出去再回來要重新要鎖
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && isRunning) {
            await requestWakeLock();
        }
    });

    let audioCtx;
    function playBeep(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'warn') {
            osc.frequency.value = 400;
            osc.type = 'square';
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'danger') {
            osc.frequency.value = 800;
            osc.type = 'sawtooth';
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'jerk') {
            osc.frequency.value = 600;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    const bgCanvas = document.getElementById('g-meter-bg');
    const bgCtx = bgCanvas.getContext('2d');
    const cx = 150, cy = 150;
    
    bgCtx.strokeStyle = '#333';
    bgCtx.lineWidth = 1;
    for(let g = 0.1; g <= 0.4; g += 0.1) {
        bgCtx.beginPath();
        bgCtx.arc(cx, cy, g * (150/0.5), 0, Math.PI * 2);
        bgCtx.stroke();
        bgCtx.fillStyle = '#555';
        bgCtx.fillText(g.toFixed(1)+'G', cx + 2, cy - (g * (150/0.5)) + 12);
    }
    bgCtx.beginPath();
    bgCtx.moveTo(cx, 0); bgCtx.lineTo(cx, 300);
    bgCtx.moveTo(0, cy); bgCtx.lineTo(300, cy);
    bgCtx.stroke();

    const fgCanvas = document.getElementById('g-meter');
    const fgCtx = fgCanvas.getContext('2d');

    function handleMotion(event) {
        if (!isRunning) return;
        
        let acc = event.acceleration; 
        if (!acc || acc.x === null) {
            acc = event.accelerationIncludingGravity; 
        }
        if (!acc || acc.x === null) return;

        // 計算相對原始數據
        let dx = acc.x - baseline.x;
        let dy = acc.y - baseline.y;
        let dz = acc.z - baseline.z;

        // 判斷螢幕方向來交換軸向 (橫向模式)
        let angle = (screen.orientation || {}).angle || window.orientation || 0;
        let rawLat, rawLon;
        
        // Z軸永遠是縱向(前後)，橫向則依據轉左還是轉右決定是 X 還是 Y
        if (angle === 90) {
            rawLat = dy;
            rawLon = dz;
        } else if (angle === -90 || angle === 270) {
            rawLat = -dy;
            rawLon = dz;
        } else if (angle === 180) {
            rawLat = -dx;
            rawLon = dz;
        } else {
            rawLat = dx; // 預設直立
            rawLon = dz;
        }

        const alpha = 0.05;
        if (Math.abs(rawLat) < DEADZONE * 9.81) rawLat = 0;
        if (Math.abs(rawLon) < DEADZONE * 9.81) rawLon = 0;

        let latG = (rawLat * alpha + currentG.x * (1 - alpha)) / 9.81;
        let lonG = (rawLon * alpha + currentG.y * (1 - alpha)) / 9.81;
        
        currentG.x = latG;
        currentG.y = lonG;
        
        let totalG = Math.sqrt(latG*latG + lonG*lonG);
        
        let now = Date.now();
        let dt = (now - lastTime) / 1000;
        let jerk = 0;
        
        if (dt > 0 && dt < 1) {
            jerk = Math.abs(totalG - lastTotalG) / dt;
        }
        lastTime = now;
        lastTotalG = totalG;

        let stateColor = 'var(--comfort)';
        let isSmooth = true;

        if (totalG >= T_DANGER) {
            stateColor = 'var(--danger)';
            stats.violations++;
            stats.score -= 1.0;
            isSmooth = false;
            if (Math.random() < 0.1) playBeep('danger'); 
        } else if (totalG >= T_WARN) {
            stateColor = 'var(--warn)';
            stats.score -= 0.15;
            isSmooth = false;
            if (Math.random() < 0.05) playBeep('warn');
        }

        if (jerk > JERK_LIMIT && totalG > DEADZONE) {
            stats.score -= 0.3;
            isSmooth = false;
        }

        if (isSmooth) {
            stats.score += 0.08; 
        }

        stats.maxLat = Math.max(stats.maxLat, Math.abs(latG));
        if (lonG > stats.maxBrake) stats.maxBrake = lonG; 
        stats.score = Math.max(0, Math.min(100, stats.score));

        document.getElementById('val-total').innerText = totalG.toFixed(2);
        document.getElementById('val-total').style.color = stateColor;
        document.getElementById('val-lat').innerText = latG.toFixed(2);
        document.getElementById('val-lon').innerText = lonG.toFixed(2);
        document.getElementById('stat-lat').innerText = stats.maxLat.toFixed(2);
        document.getElementById('stat-lon').innerText = stats.maxBrake.toFixed(2);
        document.getElementById('stat-viol').innerText = stats.violations;
        document.getElementById('val-score').innerText = Math.round(stats.score);

        historyPath.push({ x: latG, y: lonG });
        if (historyPath.length > 50) historyPath.shift();
    }

    function draw() {
        if (!isRunning) {
            requestAnimationFrame(draw);
            return;
        }
        
        fgCtx.clearRect(0, 0, 300, 300);
        
        if (historyPath.length > 1) {
            fgCtx.beginPath();
            fgCtx.lineWidth = 4;
            fgCtx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
            for (let i = 0; i < historyPath.length; i++) {
                let px = cx + (historyPath[i].x / 0.5) * 150;
                let py = cy - (historyPath[i].y / 0.5) * 150;
                if (i === 0) fgCtx.moveTo(px, py);
                else fgCtx.lineTo(px, py);
            }
            fgCtx.stroke();
        }

        let currentPx = cx + (currentG.x / 0.5) * 150;
        let currentPy = cy - (currentG.y / 0.5) * 150;
        
        fgCtx.beginPath();
        fgCtx.arc(currentPx, currentPy, 8, 0, Math.PI * 2);
        fgCtx.fillStyle = '#ff0055';
        fgCtx.fill();

        requestAnimationFrame(draw);
    }

    document.getElementById('btn-toggle').addEventListener('click', async () => {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                let state = await DeviceMotionEvent.requestPermission();
                if (state !== 'granted') return alert('被拒絕存取感測器啦！');
            } catch (e) { console.error(e); }
        }
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        isRunning = !isRunning;
        let btn = document.getElementById('btn-toggle');
        if (isRunning) {
            await requestWakeLock(); // 要喚醒鎖
            window.addEventListener('devicemotion', handleMotion);
            btn.innerText = '停止';
            btn.classList.add('active');
            lastTime = Date.now();
        } else {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
            window.removeEventListener('devicemotion', handleMotion);
            btn.innerText = '啟動';
            btn.classList.remove('active');
        }
    });

    document.getElementById('btn-cal').addEventListener('click', () => {
        let listener = (e) => {
            let acc = e.accelerationIncludingGravity || e.acceleration;
            if(acc && acc.x !== null) {
                baseline.x = acc.x;
                baseline.y = acc.y;
                baseline.z = acc.z;
                historyPath = [];
                stats = { maxLat: 0, maxBrake: 0, violations: 0, score: 100 };
                playBeep('jerk'); 
            }
            window.removeEventListener('devicemotion', listener);
        };
        window.addEventListener('devicemotion', listener);
    });

    draw();
</script>
</body>
</html>
